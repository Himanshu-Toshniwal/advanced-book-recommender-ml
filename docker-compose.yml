version: '3.8'

services:
  book-recommender:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-recommender-app
    stdin_open: true   # docker run -i  (interactive CLI)
    tty: true          # docker run -t
    environment:
      - PYTHONPATH=/app
      - MPLBACKEND=Agg          # no display in container
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data        # persist / inject real Kaggle CSVs here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import pandas, sklearn, matplotlib; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - book-network

networks:
  book-network:
    driver: bridge
